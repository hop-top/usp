name: E2E Replay
on: [pull_request]

jobs:
  e2e:
    name: E2E Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + Run E2E (replay mode)
        run: |
          docker compose -f e2e/docker/docker-compose.yml \
            up --build --exit-code-from usp-e2e

      - name: Check cassette diff
        run: |
          if ! git diff --quiet e2e/cassettes/; then
            echo "::error::Cassettes changed"
            git diff e2e/cassettes/
            exit 1
          fi
